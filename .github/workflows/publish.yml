# ─── Publish workflow ───────────────────────────────────────────
# Replaces the dry-run-on-PR / real-publish-on-main pattern used
# across library and API repos in Bitbucket.
#
# Key improvements over Bitbucket:
# - Single workflow handles both PR dry-run and main publish
# - Artifact passing between jobs (no re-building)
# - OIDC auth (no long-lived credentials)
# - Multi-crate publishing via matrix (replaces duplicated steps)
name: Publish

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build once, use everywhere ─────────────────────────────
  # Bitbucket rebuilds in every step. GitHub lets you build once
  # and pass artifacts to downstream jobs.
  build:
    name: Build release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: publish-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Compute version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[0].version')
          BUILD="${VERSION}+build.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version: $BUILD"

      # ─── Artifact passing ──────────────────────────────────
      # Upload the binary once; downstream jobs download it.
      # Bitbucket shares artifacts between steps in the same
      # pipeline, but can't share across pipelines or repos.
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: target/release/github-actions-demo
          retention-days: 5

    outputs:
      version: ${{ steps.version.outputs.version }}
      build_version: ${{ steps.version.outputs.build_version }}

  # ── Dry run on PRs ─────────────────────────────────────────
  publish-dry-run:
    name: Publish (dry run)
    needs: [build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Multi-crate matrix — replaces duplicated publish steps
    # in multi-crate repos.
    strategy:
      matrix:
        crate: [github-actions-demo]
        # For multi-crate repos, list all crates:
        # crate: [my-lib, my-lib-derive, my-lib-macros]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish dry run
        env:
          CRATE: ${{ matrix.crate }}
        run: cargo publish --dry-run -p "$CRATE"

  # ── Real publish on main ───────────────────────────────────
  publish:
    name: Publish
    needs: [build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    strategy:
      max-parallel: 1 # publish crates sequentially (dependency order)
      matrix:
        crate: [github-actions-demo]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Download the artifact built earlier — no rebuild needed
      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: release-binary
          path: target/release/

      - name: Publish to registry
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
          CRATE: ${{ matrix.crate }}
        run: |
          echo "Would publish $CRATE v${BUILD_VERSION}"
          # cargo publish -p "$CRATE"

  # ── Publish documentation ──────────────────────────────────
  # Replaces the separate doc-publish steps across library and
  # API repos.
  docs:
    name: Publish docs
    needs: [build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Generate documentation
        run: cargo doc --no-deps

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdoc
          path: target/doc/
