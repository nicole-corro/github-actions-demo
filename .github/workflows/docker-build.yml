# ─── Docker image build + push ──────────────────────────────────
# Replaces Docker image build pipelines. GitHub Actions has native Docker
# layer caching, multi-platform builds, and conditional triggers
# that are more powerful than Bitbucket's changeset includes.
name: Docker Build

on:
  push:
    branches: [main]
    # Only build when Dockerfile or related files change
    paths:
      - "Dockerfile"
      - "docker/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker/**"

# ─── Permissions for OIDC + GHCR ──────────────────────────────
permissions:
  contents: read
  packages: write
  id-token: write # needed for OIDC to AWS ECR

jobs:
  # ─── Detect which images changed ───────────────────────────
  # GitHub's path filters + dorny/paths-filter give per-job
  # conditional execution. Bitbucket uses changeset includes but
  # can't dynamically skip/include matrix entries.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      node: ${{ steps.filter.outputs.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'docker/rust-build/**'
            node:
              - 'docker/node-build/**'

  build-rust:
    name: Build Rust image
    needs: [changes]
    if: >-
      needs.changes.outputs.rust == 'true'
      || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ─── OIDC auth to AWS ECR ──────────────────────────────
      # Replaces the OIDC setup scripts duplicated across all
      # Bitbucket repos. GitHub OIDC is a first-class feature.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::111122223333:role/github-actions
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ─── Docker Buildx with layer caching ──────────────────
      # Native layer caching via GitHub Actions cache backend.
      # Bitbucket disables BuildKit entirely (DOCKER_BUILDKIT=0).
      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/rust-build
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            111122223333.dkr.ecr.ap-southeast-2.amazonaws.com/rust-build:latest
            111122223333.dkr.ecr.ap-southeast-2.amazonaws.com/rust-build:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Multi-platform — build ARM and x86 in one step.
          # Bitbucket repos switch architectures manually per step.
          platforms: linux/amd64,linux/arm64

  build-node:
    name: Build Node image
    needs: [changes]
    if: >-
      needs.changes.outputs.node == 'true'
      || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::111122223333:role/github-actions
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/node-build
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            111122223333.dkr.ecr.ap-southeast-2.amazonaws.com/node-build:latest
            111122223333.dkr.ecr.ap-southeast-2.amazonaws.com/node-build:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
