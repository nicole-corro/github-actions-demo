# ─── Single CI pipeline ─────────────────────────────────────────
# One workflow to rule them all. Handles:
# - Draft PRs → entire pipeline skipped (zero CI minutes)
# - Non-draft PRs → full check suite runs automatically
# - Push to main → same checks, plus publish + coverage
# - Merge blocked until CI Gate passes
name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"

  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC

  workflow_dispatch:

# Cancel in-flight runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  # ── Draft detection ────────────────────────────────────────
  # All downstream jobs depend on this. If the PR is a draft,
  # everything is skipped — zero CI minutes burned.
  # Bitbucket has no equivalent.
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      is_draft: ${{ steps.check.outputs.is_draft }}
      is_main: ${{ steps.check.outputs.is_main }}
    steps:
      - id: check
        env:
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          REF: ${{ github.ref }}
        run: |
          echo "is_draft=${IS_DRAFT:-false}" >> "$GITHUB_OUTPUT"
          if [[ "$REF" == "refs/heads/main" ]]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Format check ───────────────────────────────────────────
  fmt:
    name: Rustfmt
    needs: [preflight]
    if: needs.preflight.outputs.is_draft != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Lint ───────────────────────────────────────────────────
  clippy:
    name: Clippy
    needs: [preflight]
    if: needs.preflight.outputs.is_draft != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: clippy-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: clippy-${{ runner.os }}-
      - run: cargo clippy --all-targets -- -D warnings

  # ── Tests (cross-platform matrix) ─────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: [preflight]
    if: needs.preflight.outputs.is_draft != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            test-${{ runner.os }}-
            ${{ hashFiles('Cargo.lock') }}
          restore-keys: test-${{ runner.os }}-
      - name: Run tests
        run: cargo test --verbose
      - name: Build release binary
        run: cargo build --release

  # ── License check ──────────────────────────────────────────
  licenses:
    name: License check
    needs: [preflight]
    if: needs.preflight.outputs.is_draft != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check licenses

  # ── Security audit (informational) ────────────────────────
  audit:
    name: Security audit
    needs: [preflight]
    if: needs.preflight.outputs.is_draft != 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Feature-flag matrix ────────────────────────────────────
  feature-tests:
    name: Features (${{ matrix.features }})
    needs: [preflight]
    if: needs.preflight.outputs.is_draft != 'true'
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - --all-features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            features-${{ runner.os }}-
            ${{ hashFiles('Cargo.lock') }}-
            ${{ matrix.features }}
      - name: Test with feature flags
        env:
          FEATURE_FLAGS: ${{ matrix.features }}
        run: cargo test --verbose $FEATURE_FLAGS

  # ── Integration tests (service containers) ─────────────────
  integration:
    name: Integration (${{ matrix.service }})
    needs: [preflight]
    if: needs.preflight.outputs.is_draft != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: localstack
            image: localstack/localstack:latest
            port: 4566
            health: "curl -f http://localhost:4566/_localstack/health"
          - service: postgres
            image: postgres:16
            port: 5432
            health: pg_isready
    runs-on: ubuntu-latest
    services:
      backend:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port }}:${{ matrix.port }}
        env:
          SERVICES: s3,sqs,dynamodb
          DEFAULT_REGION: ap-southeast-2
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "${{ matrix.health }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --verbose

  # ── Coverage ───────────────────────────────────────────────
  coverage:
    name: Code coverage
    needs: [test]
    if: needs.preflight.outputs.is_draft != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info

  # ── Publish (dry-run on PR, real on main) ──────────────────
  publish:
    name: Publish
    needs: [test, clippy, fmt]
    if: >-
      needs.preflight.outputs.is_draft != 'true'
      && needs.preflight.outputs.is_main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to registry
        run: |
          echo "Would publish $(cargo metadata --no-deps \
            --format-version 1 | jq -r '.packages[0].version')"
          # cargo publish

  publish-dry-run:
    name: Publish (dry run)
    needs: [test, clippy, fmt]
    if: >-
      needs.preflight.outputs.is_draft != 'true'
      && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --dry-run

  # ── CI Gate ────────────────────────────────────────────────
  # Single required status check. Branch protection only needs
  # to reference "CI Gate" — adding/removing/renaming jobs
  # above never requires a settings change.
  ci-gate:
    name: CI Gate
    if: always()
    needs:
      - preflight
      - fmt
      - clippy
      - test
      - licenses
      - audit
      - feature-tests
      - integration
      - coverage
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        env:
          IS_DRAFT: ${{ needs.preflight.outputs.is_draft }}
          FMT: ${{ needs.fmt.result }}
          CLIPPY: ${{ needs.clippy.result }}
          TEST: ${{ needs.test.result }}
          LICENSES: ${{ needs.licenses.result }}
          AUDIT: ${{ needs.audit.result }}
          FEATURES: ${{ needs.feature-tests.result }}
          INTEGRATION: ${{ needs.integration.result }}
          COVERAGE: ${{ needs.coverage.result }}
        run: |
          # Draft PRs get a free pass
          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "Draft PR — skipping gate"
            exit 0
          fi

          echo "fmt:         $FMT"
          echo "clippy:      $CLIPPY"
          echo "test:        $TEST"
          echo "licenses:    $LICENSES"
          echo "audit:       $AUDIT (allowed to fail)"
          echo "features:    $FEATURES"
          echo "integration: $INTEGRATION"
          echo "coverage:    $COVERAGE"

          # audit is allowed to fail (continue-on-error)
          # coverage/integration are allowed to be skipped
          for check in "$FMT" "$CLIPPY" "$TEST" "$LICENSES" \
                        "$FEATURES"; do
            if [[ "$check" != "success" ]]; then
              echo "::error::Required checks did not all succeed"
              exit 1
            fi
          done

          for check in "$INTEGRATION" "$COVERAGE"; do
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error::Required checks did not all succeed"
              exit 1
            fi
          done

          echo "All checks passed"
